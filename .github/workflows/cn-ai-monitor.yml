# 放到仓库的 .github/workflows/cn-ai-monitor.yml
name: cn-ai-monitor

on:
  workflow_dispatch:            # 手动触发(首跑用这个)
    inputs:
      mode:
        description: "head 或 full"
        default: "head"
  schedule:
    # UTC 时间。23:30 UTC = 次日 07:30 北京时间(能收前一晚的晚间公告, 上班前送达)
    - cron: "30 23 * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install akshare pandas

      - name: Decide MODE
        id: m
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            # 每 3 天(按年内第几天整除)跑一次 full, 其余日跑 head。full 已包含 head。
            if [ $(( $(date +%j | sed 's/^0*//') % 3 )) -eq 0 ]; then
              echo "mode=full" >> $GITHUB_OUTPUT
            else
              echo "mode=head" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Collect (国内公告+快讯+行情)
        env:
          MODE: ${{ steps.m.outputs.mode }}
        run: python cn_ai_monitor.py

      - name: Write article & send mail
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          QQ_USER: ${{ secrets.QQ_USER }}
          QQ_AUTH: ${{ secrets.QQ_AUTH }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python write_and_send.py

      - name: Save report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ steps.m.outputs.mode }}
          path: |
            report.md
            report.json
          retention-days: 14
