# 放到仓库的 .github/workflows/live.yml
name: live

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "fast(快讯+A股公告) 或 slow(港股公告+外媒)"
        default: "fast"
  schedule:
    - cron: "*/15 * * * *"   # 快线: 国内5个快讯源 + 东财公告大全(A股)
    - cron: "7 */2 * * *"    # 慢线: 巨潮港股公告 + 外媒 Google News(每2小时)

# fast 与 slow 用各自的锁, 否则 slow(20-40分钟)会把每15分钟的 fast 全挤掉
concurrency:
  group: live-${{ github.event.schedule || 'manual' }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install akshare pandas feedparser oss2

      - name: Decide MODE
        id: m
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "7 */2 * * *" ]; then
            echo "mode=slow" >> $GITHUB_OUTPUT
          else
            echo "mode=fast" >> $GITHUB_OUTPUT
          fi

      - name: Collect and upload to OSS
        env:
          MODE: ${{ steps.m.outputs.mode }}
          OSS_KEY_ID: ${{ secrets.OSS_KEY_ID }}
          OSS_KEY_SECRET: ${{ secrets.OSS_KEY_SECRET }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
        run: python live.py
