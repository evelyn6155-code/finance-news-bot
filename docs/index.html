<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI公司实时监测</title>
<style>
:root{
  --bg:#EEF1F4; --surface:#fff; --ink:#14171C; --muted:#6B7280;
  --rule:#DFE4E9; --signal:#E8352E; --link:#1F5FD0; --wash:#F7F9FA;
  --serif:"Songti SC","STSong","SimSun","Noto Serif CJK SC",serif;
  --sans:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Hiragino Sans GB",sans-serif;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,"Courier New",monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;
     line-height:1.6;-webkit-font-smoothing:antialiased}
.wrap{max-width:960px;margin:0 auto;padding:0 16px 64px}
header{position:sticky;top:0;z-index:10;background:var(--bg);
       border-bottom:1px solid var(--rule);padding:16px 0 0}
.hd{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
h1{font-family:var(--serif);font-size:22px;font-weight:700;letter-spacing:-.01em}
.live{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);
      font-size:11px;color:var(--signal);text-transform:uppercase;letter-spacing:.08em}
.dot{width:6px;height:6px;border-radius:50%;background:var(--signal);
     animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.meta{font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:auto}
.bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:12px 0}
.seg{display:flex;border:1px solid var(--rule);border-radius:2px;overflow:hidden;background:var(--surface)}
.seg button{font-family:var(--sans);font-size:12px;padding:5px 12px;border:0;background:transparent;
            color:var(--muted);cursor:pointer}
.seg button[aria-pressed=true]{background:var(--ink);color:#fff}
.seg button:focus-visible{outline:2px solid var(--link);outline-offset:-2px}
input[type=search]{font-family:var(--sans);font-size:12px;padding:6px 10px;border:1px solid var(--rule);
      border-radius:2px;background:var(--surface);width:170px;color:var(--ink)}
input[type=search]:focus{outline:2px solid var(--link);outline-offset:-1px}
.chk{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);cursor:pointer}
.co{background:var(--surface);border:1px solid var(--rule);border-radius:2px;
    padding:12px 14px;margin-top:10px}
.co-hd{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.co-name{font-family:var(--serif);font-size:17px;font-weight:700}
.co-code{font-family:var(--mono);font-size:11px;color:var(--muted)}
.tag{font-family:var(--mono);font-size:10px;padding:1px 5px;border:1px solid var(--rule);
     color:var(--muted);border-radius:2px}
.tag.new{color:var(--signal);border-color:var(--signal)}
.ticks{display:flex;gap:1px;margin-left:auto;align-items:flex-end}
.tick{width:3px;height:11px;background:var(--rule)}
.tick.on{background:var(--ink)}
.tick.hot{background:var(--signal)}
.co-n{font-family:var(--mono);font-size:11px;color:var(--muted);min-width:34px;text-align:right}
ul{list-style:none;margin-top:8px;border-top:1px solid var(--rule);padding-top:6px}
li{display:flex;gap:10px;padding:4px 0;font-size:13px;align-items:baseline}
li+li{border-top:1px solid var(--wash)}
.ts{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap;min-width:52px}
.ts.fresh{color:var(--signal)}
.tx{flex:1}
.tx a{color:var(--link);text-decoration:none;font-size:12px;white-space:nowrap}
.tx a:hover{text-decoration:underline}
.kind{font-family:var(--mono);font-size:10px;color:var(--muted);border-left:2px solid var(--rule);
      padding-left:4px;margin-right:2px}
.kind.ann{border-color:var(--ink);color:var(--ink)}
.empty{text-align:center;color:var(--muted);padding:60px 0;font-size:13px}
footer{margin-top:28px;padding-top:10px;border-top:1px solid var(--rule);
       font-family:var(--mono);font-size:10px;color:var(--muted);line-height:1.8}
@media(prefers-reduced-motion:reduce){.dot{animation:none}}
@media(max-width:600px){.ticks{display:none}h1{font-size:18px}}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="hd">
    <h1>AI公司实时监测</h1>
    <span class="live"><span class="dot"></span>LIVE</span>
    <span class="meta" id="meta">加载中…</span>
  </div>
  <div class="bar">
    <div class="seg" id="grp">
      <button data-g="all" aria-pressed="true">全部</button>
      <button data-g="国内" aria-pressed="false">国内公司</button>
      <button data-g="国外" aria-pressed="false">国外公司</button>
    </div>
    <div class="seg" id="srt">
      <button data-s="heat" aria-pressed="true">按热度</button>
      <button data-s="pri" aria-pressed="false">按重要性</button>
    </div>
    <input type="search" id="q" placeholder="搜公司 / 关键词">
    <label class="chk"><input type="checkbox" id="annOnly">仅看公告</label>
  </div>
</header>
<main id="main"><div class="empty">加载中…</div></main>
<footer id="foot"></footer>
</div>
<script>
const S={g:"all",s:"heat",q:"",ann:false};let DATA=null;
const H=s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const mins=t=>(Date.now()-new Date(t))/6e4;
function rel(t){const m=mins(t);
  if(m<1)return "刚刚";if(m<60)return Math.floor(m)+"分钟前";
  if(m<1440)return Math.floor(m/60)+"小时前";return Math.floor(m/1440)+"天前";}
function heat(items){let h=0;for(const i of items){
  const w=i.kind==="公告"?3:1.5,m=mins(i.time);
  h+=w*(m<60?3:m<360?2:m<1440?1:.4);}return h;}
function group(items){const m=new Map();
  for(const i of items){if(!m.has(i.company))m.set(i.company,{...i,items:[]});
    m.get(i.company).items.push(i);}return [...m.values()];}
function ticks(items){
  const b=Array(24).fill(0);
  for(const i of items){const h=Math.floor(mins(i.time)/60);if(h<24)b[23-h]++;}
  return '<div class="ticks" title="近24小时消息分布">'+b.map((n,idx)=>{
    const cls=n===0?"tick":(idx>=21?"tick hot":"tick on");
    const ht=n===0?4:Math.min(11,4+n*3);
    return `<span class="${cls}" style="height:${ht}px"></span>`;}).join("")+'</div>';}
function render(){
  const m=document.getElementById("main");
  if(!DATA){m.innerHTML='<div class="empty">加载中…</div>';return;}
  let its=DATA.items||[];
  if(S.g!=="all")its=its.filter(i=>i.group===S.g);
  if(S.ann)its=its.filter(i=>i.kind==="公告");
  if(S.q){const q=S.q.toLowerCase();
    its=its.filter(i=>(i.company+i.title+i.src).toLowerCase().includes(q));}
  let cos=group(its);
  cos.forEach(c=>c.heat=heat(c.items));
  cos.sort(S.s==="heat"?(a,b)=>b.heat-a.heat||a.pri-b.pri
                       :(a,b)=>a.pri-b.pri||b.heat-a.heat);
  if(!cos.length){m.innerHTML='<div class="empty">没有符合条件的公司。<br>换个筛选条件,或等下一次抓取。</div>';return;}
  m.innerHTML=cos.map(c=>{
    const fresh=c.items.some(i=>mins(i.time)<30);
    const code=c.code?`<span class="co-code">${H(c.code)}.${H(c.market)}</span>`:"";
    const li=c.items.slice(0,8).map(i=>{
      const f=mins(i.time)<30?" fresh":"";
      const k=i.kind==="公告"?"kind ann":"kind";
      const a=i.url?`<a href="${H(i.url)}" target="_blank" rel="noopener">（${H(i.src)}）</a>`
                   :`<span class="co-code">（${H(i.src)}）</span>`;
      return `<li><span class="ts${f}" title="${H(i.time)}">${rel(i.time)}</span>
        <span class="tx"><span class="${k}">${H(i.kind)}</span>${H(i.title)} ${a}</span></li>`;
    }).join("");
    return `<section class="co"><div class="co-hd">
      <span class="co-name">${H(c.company)}</span>${code}
      ${fresh?'<span class="tag new">NEW</span>':""}
      ${ticks(c.items)}<span class="co-n">${c.items.length}条</span>
    </div><ul>${li}</ul></section>`;}).join("");
}
function meta(){
  const el=document.getElementById("meta");
  if(!DATA){return;}
  const f=DATA.updated_fast?rel(DATA.updated_fast):"—";
  const s=DATA.updated_slow?rel(DATA.updated_slow):"—";
  el.textContent=`快讯/A股公告 ${f} · 港股公告/外媒 ${s} · 监测 ${DATA.companies_total||"—"} 家`;
  document.getElementById("foot").innerHTML=
    `数据源: 财联社 / 新浪财经 / 同花顺 / 东方财富 / 富途牛牛 / 财新网 (快讯) · 东财公告大全 (A股公告) — 约15分钟一轮<br>巨潮资讯网 (港股公告) · Google News (外媒) — 约1小时一轮<br>
     只收录名单内公司, 保留最近48小时。页面每60秒自动取新数据。`;
}
async function load(){
  try{
    const r=await fetch("data.json?t="+Date.now(),{cache:"no-store"});
    if(!r.ok)throw 0;
    DATA=await r.json();
  }catch(e){
    if(!DATA){document.getElementById("main").innerHTML=
      '<div class="empty">还没有数据。<br>等第一次抓取跑完(每15分钟一轮)后会自动出现。</div>';
      document.getElementById("meta").textContent="等待首次抓取";return;}
  }
  meta();render();
}
document.getElementById("grp").onclick=e=>{const b=e.target.closest("button");if(!b)return;
  S.g=b.dataset.g;[...e.currentTarget.children].forEach(x=>x.setAttribute("aria-pressed",x===b));render();};
document.getElementById("srt").onclick=e=>{const b=e.target.closest("button");if(!b)return;
  S.s=b.dataset.s;[...e.currentTarget.children].forEach(x=>x.setAttribute("aria-pressed",x===b));render();};
document.getElementById("q").oninput=e=>{S.q=e.target.value.trim();render();};
document.getElementById("annOnly").onchange=e=>{S.ann=e.target.checked;render();};
load();setInterval(load,60000);setInterval(()=>{if(DATA){meta();render();}},60000);
</script>
</body>
</html>
